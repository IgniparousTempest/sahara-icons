name: Release Atlas

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Build atlas
        run: |
          source .venv/bin/activate
          make atlas

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            icons/atlas.png
            icons/atlas.json
